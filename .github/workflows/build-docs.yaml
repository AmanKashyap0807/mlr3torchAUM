on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: Build docs

permissions:
  contents: read
  pull-requests: write

jobs:
  litedown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
      - name: Install torch
        run: Rscript -e 'torch::install_torch()'
      - name: Install package
        run: R CMD build . && R CMD INSTALL *.tar.gz
      - name: Fuse site
        run: R -e 'litedown::fuse_site("site")'
      - name: netlify deploy
        uses: animint/animint-actions/netlify-deploy-comment@main
        with:
          netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify_site_id: ${{ secrets.NETLIFY_SITE_ID }}
          pat_github_pr: ${{ secrets.GITHUB_TOKEN }}
          path: site
          netlify_url: mlr3torchaum.netlify.app
